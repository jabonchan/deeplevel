name: Publish to JSR

on:
    release:
        types: [published]

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: master


            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: 2.7.14

            - name: Run tests
              run: deno test --allow-all

            - name: Publish package to JSR
              run: deno publish --allow-slow-types
